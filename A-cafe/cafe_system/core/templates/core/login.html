{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — चिया Garden</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'core/style.css' %}">
  <style>
    body {
      background: var(--cg-dark);
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      background-image: radial-gradient(ellipse at top, #2d1200 0%, #1a0800 60%, #0a0400 100%);
    }
    .login-wrap { width: 380px; }
    .login-logo-box {
      text-align: center; margin-bottom: 24px;
    }
    .login-logo-box img {
      width: 110px; height: 110px; border-radius: 50%;
      border: 4px solid var(--cg-gold);
      box-shadow: 0 0 30px rgba(212,160,23,0.4);
      object-fit: cover;
    }
    .login-logo-fallback {
      width: 110px; height: 110px; border-radius: 50%;
      border: 4px solid var(--cg-gold);
      background: #2d1200;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 3rem; color: var(--cg-gold);
      box-shadow: 0 0 30px rgba(212,160,23,0.4);
    }
    .login-title {
      font-size: 2rem; font-weight: 800; color: var(--cg-gold);
      font-family: 'Segoe UI', system-ui, sans-serif;
      letter-spacing: 0.02em; margin-top: 10px;
    }
    .login-subtitle { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
    .login-card {
      background: #fff; border-radius: 16px; padding: 2rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      border-top: 4px solid var(--cg-gold);
    }
    .input-group-text { background: #f5ede0; border-color: #ddd; color: var(--cg-orange); }
    .form-control:focus { border-color: var(--cg-orange); box-shadow: 0 0 0 3px rgba(200,90,0,0.15); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo-box">
      <img src="{% static 'core/logo.png' %}" alt="Chiya Garden Logo"
           onerror="this.style.display='none';document.getElementById('logoFallback').style.display='inline-flex';">
      <span class="login-logo-fallback" id="logoFallback" style="display:none;">
        <i class="bi bi-cup-hot-fill"></i>
      </span>
      <div class="login-title">चिया Garden</div>
      <div class="login-subtitle">चिया, साथी अनि गफ</div>
    </div>

    <div class="login-card">
      <h5 class="fw-bold mb-3" style="color:var(--cg-dark);">
        <i class="bi bi-shield-lock" style="color:var(--cg-orange);"></i> Staff Login
      </h5>
      {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}
      <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold small">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-login w-100 fw-semibold py-2">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>
    </div>
  </div>
</body>
</html>
